<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>
  <div class="card"><h1>Laporan</h1></div>
  <div id="list"></div>
  <script src="app.js"></script>
  <script>
    window.addEventListener('db-ready', async () => {
      const data = await window.getAllData('transaksi');
      document.getElementById('list').innerHTML = data.map(d => 
        `<div class="card">Total: Rp ${d.total}</div>`).join('');
    });
  </script>
</body>
</html>
