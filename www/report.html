<script src="app.js"></script>
<script>
  window.addEventListener('db-ready', async () => {
    const listDiv = document.getElementById('list');
    const data = await window.getAllData('transaksi');
    
    if (data.length === 0) {
      listDiv.innerHTML = "<p style='text-align:center'>Belum ada transaksi.</p>";
      return;
    }

    listDiv.innerHTML = data.map(t => `
      <div class="card">
        <p>Tanggal: ${new Date(t.tanggal).toLocaleDateString()}</p>
        <p>Total: <b>Rp ${t.total.toLocaleString()}</b></p>
      </div>
    `).join('');
  });
</script>
