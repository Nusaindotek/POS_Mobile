<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Laporan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F2537] text-white p-6">
  <h1 class="text-xl font-bold mb-4">Rekap Transaksi</h1>
  <div id="report" class="bg-gray-800 p-4 rounded-xl shadow-lg"></div>
  <button onclick="window.print()" class="mt-4 w-full bg-[#14B3B5] p-3 rounded font-bold">CETAK/SIMPAN PDF</button>

  <script>
    const history = JSON.parse(localStorage.getItem('transaction_history') || '[]');
    const total = history.reduce((sum, t) => sum + t.total, 0);
    
    document.getElementById('report').innerHTML = `
      <div class="text-sm">Total Transaksi: ${history.length}</div>
      <div class="text-3xl font-black text-[#14B3B5]">Rp ${total.toLocaleString()}</div>
    `;
  </script>
</body>
</html>
