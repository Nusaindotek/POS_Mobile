<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Laporan</title>
  <style>
    :root { --navy: #1B365D; --tosca: #00B5B5; --bg: #0F2537; }
    body { background: var(--bg); color: white; font-family: sans-serif; }
    .item { background: var(--navy); padding: 15px; margin: 10px; border-radius: 10px; display:flex; justify-content:space-between; }
  </style>
</head>
<body>
  <div style="padding:15px"><h1>Laporan</h1></div>
  <div id="list"></div>
  <script src="app.js"></script>
  <script>
    window.onload = async () => {
      const data = await window.getAllData('transaksi');
      const list = document.getElementById('list');
      data.forEach(d => {
        list.innerHTML += `<div class="item"><span>${new Date(d.tanggal).toLocaleDateString()}</span><b>Rp ${d.total}</b></div>`;
      });
    };
  </script>
</body>
</html>
