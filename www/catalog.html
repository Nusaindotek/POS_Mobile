<script>
    let db;
    let keranjang = [];
    let produk = [];

    document.addEventListener("DOMContentLoaded", () => {
      const request = indexedDB.open("NUSAPOS_DB", 2); // naikin versi ke 2 biar ke reset
      
      request.onupgradeneeded = (e) => {
        db = e.target.result;
        if(!db.objectStoreNames.contains('produk')) db.createObjectStore('produk', {keyPath: 'id'});
        if(!db.objectStoreNames.contains('transaksi')) db.createObjectStore('transaksi', {keyPath: 'id'});
      };

      request.onsuccess = (e) => { 
        db = e.target.result; 
        isiProdukDummy(); // langsung isi dummy
        loadProduk();
      };

      request.onerror = () => alert("Gagal buka database");
    });

    function isiProdukDummy() {
      const produkDummy = [
        {id:1, nama:"Nasi Goreng", harga:15000},
        {id:2, nama:"Es Teh", harga:4000},
        {id:3, nama:"Ayam Bakar", harga:20000},
        {id:4, nama:"Aqua", harga:3000},
      ];
      const tx = db.transaction('produk', 'readwrite');
      const store = tx.objectStore('produk');
      store.clear(); // hapus dulu biar gak dobel
      produkDummy.forEach(p => store.add(p));
    }

    async function getAllData(storeName) {
        return new Promise((resolve) => {
            db.transaction(storeName, "readonly").objectStore(storeName).getAll().onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function loadProduk() {
      produk = await getAllData('produk');
      
      const list = document.getElementById('produk-list');
      list.innerHTML = '';
      if(produk.length === 0) {
        list.innerHTML = `<p style="text-align:center; color:#888">Gagal load produk. Coba refresh</p>`;
        return;
      }
      produk.forEach(p => {
        list.innerHTML += `
          <div class="produk-card">
            <b>${p.nama}</b><br>
            <small class="tosca">Rp ${p.harga.toLocaleString('id-ID')}</small><br>
            <button onclick="tambahKeranjang(${p.id})">+ Tambah</button>
          </div>
        `;
      });
    }

    function tambahKeranjang(id) {
      const item = produk.find(p => p.id === id);
      const diKeranjang = keranjang.find(k => k.id === id);
      if(diKeranjang) diKeranjang.qty++;
      else keranjang.push({...item, qty:1});
      renderKeranjang();
    }

    function renderKeranjang() {
      const list = document.getElementById('list-keranjang');
      const total = keranjang.reduce((sum, i) => sum + i.harga * i.qty, 0);
      document.getElementById('total-harga').innerText = `Rp ${total.toLocaleString('id-ID')}`;
      
      if(keranjang.length === 0) {
        list.innerHTML = `<small style="color:#888">Belum ada barang</small>`;
        return;
      }
      list.innerHTML = '';
      keranjang.forEach(i => {
        list.innerHTML += `<div class="keranjang-item"><span>${i.nama} x${i.qty}</span><span>Rp ${(i.harga*i.qty).toLocaleString('id-ID')}</span></div>`
      });
    }

    function buatStruk(transaksi) {
      let struk = `========================\n     NUSAPOS STORE\n========================\n`;
      transaksi.items.forEach(item => {
        struk += `${item.nama}\n${item.qty} x ${item.harga.toLocaleString('id-ID')} = ${(item.qty*item.harga).toLocaleString('id-ID')}\n`;
      });
      struk += `------------------------\nTOTAL: Rp ${transaksi.total.toLocaleString('id-ID')}\n========================\n  TERIMA KASIH\n`;
      return struk;
    }

    function simpanTransaksi() {
      if(keranjang.length === 0) return alert("Keranjang kosong");
      
      const totalHarga = keranjang.reduce((sum, i) => sum + i.harga * i.qty, 0);
      const transaksiBaru = {
          id: Date.now(),
          tanggal: new Date(),
          items: keranjang,
          total: totalHarga
      };

      const tx = db.transaction('transaksi', 'readwrite');
      tx.objectStore('transaksi').add(transaksiBaru);
      tx.oncomplete = () => {
          const strukText = buatStruk(transaksiBaru);
          console.log("ISI STRUK:", strukText);
          
          alert("Transaksi Berhasil Disimpan!");
          keranjang = [];
          renderKeranjang();
          window.location.href = 'dashboard.html';
      }
    }
</script>
