<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kasir</title>
  <style>
    body { background: #0F2537; color: white; font-family: sans-serif; margin: 0; padding: 15px; }
    .btn { background: #00B5B5; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Kasir</h1>
  <select id="prod" style="width:100%; padding:10px; background:#1B365D; color:white;">
    <option value="15000|Nasi Goreng">Nasi Goreng - Rp 15.000</option>
    <option value="20000|Ayam Bakar">Ayam Bakar - Rp 20.000</option>
  </select>
  <button class="btn" onclick="tambah()">TAMBAH KE KERANJANG</button>
  <div id="cart"></div>
  <button class="btn" onclick="checkout()">BAYAR SEKARANG</button>
  
  <script src="app.js"></script>
  <script>
    let cart = [];
    function tambah() {
      const val = document.getElementById('prod').value.split('|');
      cart.push({nama: val[1], harga: parseInt(val[0])});
      alert(val[1] + " ditambahkan!");
    }
    async function checkout() {
      const total = cart.reduce((a, b) => a + b.harga, 0);
      await window.saveTransaction({tanggal: new Date().toISOString(), total: total});
      alert("Transaksi Berhasil!");
      cart = [];
    }
  </script>
</body>
</html>
