<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NusaPOS Mobile - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nusanavy: '#0F2537',
            nusatosca: '#14B3B5',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-nusanavy font-sans h-screen flex flex-col justify-between overflow-hidden select-none text-white">

  <header class="bg-nusanavy border-b border-gray-800 p-4 flex justify-between items-center shadow-md">
    <div class="flex items-center space-x-3">
      <img src="../icon.png" alt="Logo" class="w-8 h-8 object-contain">
      <div>
        <h1 class="text-sm font-bold tracking-wide">NusaPOS Owner</h1>
        <p class="text-[10px] text-nusatosca font-medium">Status: Premium Beta</p>
      </div>
    </div>
    <span id="clock" class="text-xs font-mono text-nusatosca font-bold bg-gray-900/40 px-2 py-1 rounded">00:00</span>
  </header>

  <main class="flex-1 overflow-y-auto p-5 space-y-6">
    
    <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-800 flex justify-between items-center shadow-lg">
      <div>
        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block">Omset Hari Ini</span>
        <span class="text-xl font-black text-nusatosca tracking-tight">Rp 0</span>
      </div>
      <div class="text-right">
        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block">Transaksi</span>
        <span class="text-xl font-black text-white tracking-tight">0</span>
      </div>
    </div>

    <div class="space-y-3">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-1">Akses Halaman Toko</h3>
      
      <div class="grid grid-cols-2 gap-4" id="menu-container">
        
        <a href="index.html" id="menu-kasir" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 active:scale-95 transition flex flex-col items-center justify-center space-y-2 text-center shadow-md">
          <span class="text-3xl">🛒</span>
          <span class="text-xs font-bold text-gray-200 tracking-wide">Mesin Kasir</span>
          <span class="text-[9px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-full font-bold">Aktif</span>
        </a>

        <a href="catalog.html" id="menu-katalog" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 active:scale-95 transition flex flex-col items-center justify-center space-y-2 text-center shadow-md">
          <span class="text-3xl">📦</span>
          <span class="text-xs font-bold text-gray-200 tracking-wide">Katalog Barang</span>
          <span class="text-[9px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-full font-bold">Aktif</span>
        </a>

      </div>
      <p id="empty-message" class="text-center text-gray-500 text-xs py-8 hidden">Tidak ada modul aktif. Silakan aktifkan di Settings.</p>
    </div>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-gray-950/90 backdrop-blur border-t border-gray-900 p-3 flex justify-around z-50">
    <a href="dashboard.html" class="flex flex-col items-center space-y-1 text-nusatosca">
      <span class="text-xl">📊</span>
      <span class="text-[10px] font-bold uppercase tracking-wider">Dashboard</span>
    </a>
    <a href="setting.html" class="flex flex-col items-center space-y-1 text-gray-500 hover:text-nusatosca">
      <span class="text-xl">⚙️</span>
      <span class="text-[10px] font-bold uppercase tracking-wider">Settings</span>
    </a>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const kasirVisible = localStorage.getItem('modul_kasir') !== 'false';
      const katalogVisible = localStorage.getItem('modul_katalog') !== 'false';
      
      const elKasir = document.getElementById('menu-kasir');
      const elKatalog = document.getElementById('menu-katalog');
      const menuContainer = document.getElementById('menu-container');
      
      if (!kasirVisible) elKasir.style.display = 'none';
      if (!katalogVisible) elKatalog.style.display = 'none';
      
      // AMBIL DAN RENDER HALAMAN KUSTOM DARI SETTINGS
      const customPages = JSON.parse(localStorage.getItem('custom_pages')) || [];
      let totalMenuTampil = (kasirVisible ? 1 : 0) + (katalogVisible ? 1 : 0) + customPages.length;

      customPages.forEach(page => {
        const customBtn = document.createElement('a');
        customBtn.href = page.url;
        customBtn.className = "bg-gray-900/40 p-4 rounded-2xl border border-gray-800 active:scale-95 transition flex flex-col items-center justify-center space-y-2 text-center shadow-md border-nusatosca/20";
        customBtn.innerHTML = `
          <span class="text-3xl">${page.icon}</span>
          <span class="text-xs font-bold text-gray-200 tracking-wide">${page.name}</span>
          <span class="text-[9px] bg-nusatosca/20 text-nusatosca px-1.5 py-0.5 rounded-full font-bold">Kustom</span>
        `;
        menuContainer.appendChild(customBtn);
      });

      if (totalMenuTampil === 0) {
        document.getElementById('empty-message').classList.remove('hidden');
      }
    });

    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>
