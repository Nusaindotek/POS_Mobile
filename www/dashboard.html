<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NusaPOS Mobile - Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { nusanavy: '#0F2537', nusatosca: '#14B3B5' } }
  </script>
  <style>
    body { background-color: #0F2537; } /* fallback kalau tailwind gagal */
  </style>
</head>
<body class="bg-nusanavy font-sans h-screen flex flex-col text-white">

  <header class="bg-nusanavy border-b border-gray-800 p-4 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <img src="../icon.png" alt="Logo" class="w-8 h-8">
      <div>
        <h1 class="text-sm font-bold">NusaPOS Owner</h1>
        <p class="text-[10px] text-nusatosca">Status: Premium Beta</p>
      </div>
    </div>
    <span id="clock" class="text-xs font-mono text-nusatosca bg-gray-900/40 px-2 py-1 rounded">00:00</span>
  </header>

  <main class="flex-1 overflow-y-auto p-5 space-y-6 pb-24">
    <div class="bg-gray-900/50 p-4 rounded-2xl border-gray-800 flex justify-between items-center">
      <div>
        <span class="text-[10px] text-gray-400 block">Omset Hari Ini</span>
        <span id="omset-hari-ini" class="text-xl font-black text-nusatosca">Rp 0</span>
      </div>
      <div class="text-right">
        <span class="text-[10px] text-gray-400 block">Transaksi</span>
        <span id="total-transaksi" class="text-xl font-black text-white">0</span>
      </div>
    </div>

    <div class="bg-gray-900/40 p-4 rounded-2xl border-gray-800">
      <h3 class="text-xs font-bold text-gray-400 uppercase mb-2">Statistik Jualan (7 Hari Terakhir)</h3>
      <canvas id="salesChart" class="w-full h-44"></canvas>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <a href="index.html" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 text-center">🛒<br><span class="text-xs">Mesin Kasir</span></a>
      <a href="catalog.html" class="bg-gray-900/40 p-4 rounded-2xl border-gray-800 text-center">📦<br><span class="text-xs">Katalog</span></a>
      <a href="report.html" class="bg-gray-900/40 p-4 rounded-2xl border-gray-800 text-center">📄<br><span class="text-xs">Rek Koran</span></a>
    </div>
  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-gray-950/90 border-t border-gray-900 p-3 flex justify-around">
    <a href="dashboard.html" class="text-nusatosca text-center">📊<br><span class="text-">Dashboard</span></a>
    <a href="setting.html" class="text-gray-500 text-center">⚙️<br><span class="text-">Settings</span></a>
  </footer>

  <script>
    let db;
    let myChart; // biar gak dobel
    document.addEventListener("DOMContentLoaded", () => {
      const request = indexedDB.open("NUSAPOS_DB", 1);
      request.onsuccess = (e) => { db = e.target.result; loadDashboardData(); };
      setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      }, 1000);
    });

    async function getAllData(storeName) {
        return new Promise((resolve) => {
            const tx = db.transaction(storeName, "readonly");
            tx.objectStore(storeName).getAll().onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function loadDashboardData() {
        const transaksi = await getAllData('transaksi');
        const hariIni = new Date().toDateString();
        const transaksiHariIni = transaksi.filter(t => new Date(t.tanggal).toDateString() === hariIni);
        const omset = transaksiHariIni.reduce((sum, t) => sum + t.total, 0);
        document.getElementById('omset-hari-ini').innerText = `Rp ${omset.toLocaleString('id-ID')}`;
        document.getElementById('total-transaksi').innerText = transaksiHariIni.length;

        const salesData = [];
        const daysLabels = [];
        for(let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            daysLabels.push(d.toLocaleDateString('id-ID', {weekday: 'short'}));
            const omsetHari = transaksi.filter(t => new Date(t.tanggal).toDateString() === d.toDateString()).reduce((sum, t) => sum + t.total, 0);
            salesData.push(omsetHari);
        }

        const ctx = document.getElementById('salesChart').getContext('2d');
        if(myChart) myChart.destroy(); // hapus chart lama
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: daysLabels, datasets: [{ data: salesData, backgroundColor: '#14B3B5', borderRadius: 6 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}}}
        });
    }
  </script>
</body>
</html>
