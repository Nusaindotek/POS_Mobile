<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NusaPOS Mobile - Dashboard</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nusanavy: '#0F2537',
            nusatosca: '#14B3B5',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-nusanavy font-sans h-screen flex flex-col justify-between overflow-hidden select-none text-white">

  <!-- TOP BAR OWNER -->
  <header class="bg-nusanavy border-b border-gray-800 p-4 flex justify-between items-center shadow-md">
    <div class="flex items-center space-x-3">
      <img src="../icon.png" alt="Logo" class="w-8 h-8 object-contain">
      <div>
        <h1 class="text-sm font-bold tracking-wide">NusaPOS Owner</h1>
        <p class="text-[10px] text-nusatosca font-medium">Status: Premium Beta</p>
      </div>
    </div>
    <span id="clock" class="text-xs font-mono text-nusatosca font-bold bg-gray-900/40 px-2 py-1 rounded">00:00</span>
  </header>

  <!-- MAIN DASHBOARD CONTENT -->
  <main class="flex-1 overflow-y-auto p-5 space-y-6">
    
    <!-- Ringkasan Singkat Toko (Metrik Ringan) -->
    <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-800 flex justify-between items-center shadow-lg">
      <div>
        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block">Omset Hari Ini</span>
        <span class="text-xl font-black text-nusatosca tracking-tight">Rp 0</span>
      </div>
      <div class="text-right">
        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider block">Transaksi</span>
        <span class="text-xl font-black text-white tracking-tight">0</span>
      </div>
    </div>

    <!-- PENGATURAN HALAMAN AKTIF (MODUL UTAMA) -->
    <div class="space-y-3">
      <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider pl-1">Akses Halaman Toko</h3>
      
      <!-- Grid Menu yang Bisa Diakses Owner / Kasir -->
      <div class="grid grid-cols-2 gap-4">
        
        <!-- Tombol Menu 1: Mesin Kasir -->
        <a href="index.html" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 active:scale-95 transition flex flex-col items-center justify-center space-y-2 text-center shadow-md">
          <span class="text-3xl">🛒</span>
          <span class="text-xs font-bold text-gray-200 tracking-wide">Mesin Kasir</span>
          <span class="text-[9px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-full font-bold">Aktif</span>
        </a>

        <!-- Tombol Menu 2: Kelola Katalog -->
        <a href="catalog.html" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 active:scale-95 transition flex flex-col items-center justify-center space-y-2 text-center shadow-md">
          <span class="text-3xl">📦</span>
          <span class="text-xs font-bold text-gray-200 tracking-wide">Katalog Barang</span>
          <span class="text-[9px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-full font-bold">Aktif</span>
        </a>

      </div>
    </div>

  </main>

  <!-- FOOTER NAVIGATION UTAMA -->
  <footer class="fixed bottom-0 left-0 right-0 bg-gray-950/90 backdrop-blur border-t border-gray-900 p-3 flex justify-around z-50">
    <a href="dashboard.html" class="flex flex-col items-center space-y-1 text-nusatosca">
      <span class="text-xl">📊</span>
      <span class="text-[10px] font-bold uppercase tracking-wider">Dashboard</span>
    </a>
    <a href="setting.html" class="flex flex-col items-center space-y-1 text-gray-500 hover:text-nusatosca">
      <span class="text-xl">⚙️</span>
      <span class="text-[10px] font-bold uppercase tracking-wider">Settings</span>
    </a>
  </footer>

  <script>
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>
