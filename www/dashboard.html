<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    :root { --navy: #1B365D; --tosca: #00B5B5; --bg: #0F2537; }
    body { background: var(--bg); color: white; font-family: sans-serif; margin:0; }
    .card { background: var(--navy); padding: 20px; margin: 15px; border-radius: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="nama-toko">Nama Toko</h2>
    <div id="omset" style="font-size:24px; color:var(--tosca); font-weight:bold;">Rp 0</div>
  </div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:15px;">
    <a href="index.html" style="background:var(--navy); padding:20px; text-align:center; color:white; text-decoration:none;">Kasir</a>
    <a href="report.html" style="background:var(--navy); padding:20px; text-align:center; color:white; text-decoration:none;">Laporan</a>
  </div>
  <script src="app.js"></script>
  <script>
    window.onload = () => {
      const s = JSON.parse(localStorage.getItem('nusa_settings'));
      if(s) document.getElementById('nama-toko').innerText = s.nama;
    };
  </script>
</body>
</html>
