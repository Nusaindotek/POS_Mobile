<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NusaPOS Mobile - Dashboard</title>
  <style>
    body { background: #0F2537; color: white; font-family: Arial; margin: 0; padding-bottom: 80px; }
    .header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #2a3e4d; align-items:center }
    .card { background: #1a2e3d; padding: 16px; border-radius: 16px; margin: 15px; border: 1px solid #2a3e4d; }
    .tosca { color: #14B3B5; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
    .btn { background: #1a2e3d; padding: 20px; border-radius: 16px; text-align: center; text-decoration: none; color: white; border: 1px solid #2a3e4d; font-size:14px }
    .footer { position: fixed; bottom: 0; width: 100%; background: #0a141c; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2a3e4d; }
    .footer a { color: #888; text-decoration: none; text-align: center; font-size: 12px; }
    .footer .active { color: #14B3B5; }
    /* GRAFIK BATANG MANUAL */
    .chart-wrap { display:flex; align-items:flex-end; height:160px; gap:8px; padding-top:10px }
    .bar { background:#14B3B5; width:100%; border-radius:6px 6px 0 0; position:relative; min-height:4px }
    .bar span { position:absolute; bottom:-18px; left:50%; transform:translateX(-50%); font-size:10px; color:#aaa }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <img src="../icon.png" width="30" style="vertical-align:middle">
      <b>NusaPOS Owner</b><br>
      <small class="tosca">Status: Premium Beta</small>
    </div>
    <span id="clock" class="tosca">00:00</span>
  </div>

  <div class="card" style="display:flex; justify-content:space-between;">
    <div>
      <small style="color:#aaa">Omset Hari Ini</small><br>
      <b id="omset-hari-ini" class="tosca" style="font-size:20px">Rp 0</b>
    </div>
    <div style="text-align:right;">
      <small style="color:#aaa">Transaksi</small><br>
      <b id="total-transaksi" style="font-size:20px">0</b>
    </div>
  </div>

  <div class="card">
    <small style="color:#aaa">Statistik Jualan (7 Hari Terakhir)</small>
    <div id="chart-container" class="chart-wrap"></div>
  </div>

  <div class="grid2">
    <a href="index.html" class="btn">🛒<br>Mesin Kasir</a>
    <a href="catalog.html" class="btn">📦<br>Katalog</a>
    <a href="report.html" class="btn">📄<br>Rek Koran</a>
    <a href="setting.html" class="btn">⚙️<br>Settings</a>
  </div>

  <div class="footer">
    <a href="dashboard.html" class="active">📊<br>Dashboard</a>
    <a href="setting.html">⚙️<br>Settings</a>
  </div>

  <script>
    let db;
    document.addEventListener("DOMContentLoaded", () => {
      const request = indexedDB.open("NUSAPOS_DB", 1);
      request.onsuccess = (e) => { db = e.target.result; loadDashboardData(); };
      setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      }, 1000);
    });

    async function getAllData(storeName) {
        return new Promise((resolve) => {
            db.transaction(storeName, "readonly").objectStore(storeName).getAll().onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function loadDashboardData() {
        const transaksi = await getAllData('transaksi');
        const hariIni = new Date().toDateString();
        const trxHariIni = transaksi.filter(t => new Date(t.tanggal).toDateString() === hariIni);
        const omset = trxHariIni.reduce((sum, t) => sum + t.total, 0);
        document.getElementById('omset-hari-ini').innerText = `Rp ${omset.toLocaleString('id-ID')}`;
        document.getElementById('total-transaksi').innerText = trxHariIni.length;

        // BIKIN GRAFIK MANUAL PAKE DIV
        const salesData = []; 
        const daysLabels = ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'];
        let maxOmset = 1;
        for(let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const omsetHari = transaksi.filter(t => new Date(t.tanggal).toDateString() === d.toDateString()).reduce((sum, t) => sum + t.total, 0);
            salesData.push(omsetHari);
            if(omsetHari > maxOmset) maxOmset = omsetHari;
        }

        const container = document.getElementById('chart-container');
        container.innerHTML = '';
        salesData.forEach((val, i) => {
            const tinggi = (val / maxOmset) * 100; // tinggi persen
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = tinggi + '%';
            bar.innerHTML = `<span>${daysLabels[i]}</span>`;
            container.appendChild(bar);
        });
    }
  </script>
</body>
</html>
