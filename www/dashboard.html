<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NusaPOS Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F2537] text-white min-h-screen p-4 pb-24">
  <h1 class="text-lg font-bold mb-4">Dashboard Owner</h1>
  
  <div id="menu-container" class="grid grid-cols-2 gap-4">
    <a href="index.html" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 flex flex-col items-center">
      <span class="text-3xl">🛒</span>
      <span class="text-xs font-bold mt-2">Mesin Kasir</span>
    </a>
    <a href="catalog.html" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 flex flex-col items-center">
      <span class="text-3xl">📦</span>
      <span class="text-xs font-bold mt-2">Katalog</span>
    </a>
    <a href="report.html" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 flex flex-col items-center">
      <span class="text-3xl">📄</span>
      <span class="text-xs font-bold mt-2">Laporan</span>
    </a>
  </div>

  <script>
    // Memuat menu kustom dari LocalStorage
    document.addEventListener("DOMContentLoaded", () => {
      const customPages = JSON.parse(localStorage.getItem('custom_pages')) || [];
      const container = document.getElementById('menu-container');
      customPages.forEach(page => {
        const btn = document.createElement('a');
        btn.href = "#";
        btn.className = "bg-gray-900/40 p-4 rounded-2xl border border-gray-800 flex flex-col items-center border-nusatosca/30";
        btn.innerHTML = `<span class="text-3xl">${page.icon}</span><span class="text-xs font-bold mt-2">${page.name}</span>`;
        container.appendChild(btn);
      });
    });
  </script>
</body>
</html>
