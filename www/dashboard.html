<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NusaPOS Mobile - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { nusanavy: '#0F2537', nusatosca: '#14B3B5' } }
    }
  </script>
</head>
<body class="bg-nusanavy font-sans h-screen flex flex-col justify-between overflow-hidden select-none text-white">

  <header class="bg-nusanavy border-b border-gray-800 p-4 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <img src="../icon.png" alt="Logo" class="w-8 h-8">
      <div>
        <h1 class="text-sm font-bold">NusaPOS Owner</h1>
        <p class="text-[10px] text-nusatosca">Status: Premium Beta</p>
      </div>
    </div>
    <span id="clock" class="text-xs font-mono text-nusatosca bg-gray-900/40 px-2 py-1 rounded">00:00</span>
  </header>

  <main class="flex-1 overflow-y-auto p-5 space-y-6 pb-24">
    <div class="bg-gray-900/50 p-4 rounded-2xl border-gray-800 flex justify-between items-center">
      <div>
        <span class="text-[10px] text-gray-400 block">Omset Hari Ini</span>
        <span id="omset-hari-ini" class="text-xl font-black text-nusatosca">Rp 0</span>
      </div>
      <div class="text-right">
        <span class="text-[10px] text-gray-400 block">Transaksi</span>
        <span id="total-transaksi" class="text-xl font-black text-white">0</span>
      </div>
    </div>

    <div class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 space-y-3">
      <h3 class="text-xs font-bold text-gray-400 uppercase">Statistik Jualan (7 Hari Terakhir)</h3>
      <div class="relative w-full h-44">
        <canvas id="salesChart"></canvas>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4" id="menu-container">
      <a href="index.html" class="bg-gray-900/40 p-4 rounded-2xl border border-gray-800 text-center">🛒<br><span>Mesin Kasir</span></a>
      <a href="catalog.html" class="bg-gray-900/40 p-4 rounded-2xl border-gray-800 text-center">📦<br><span>Katalog</span></a>
    </div>
  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-gray-950/90 border-t border-gray-900 p-3 flex justify-around">
    <a href="dashboard.html" class="text-nusatosca">📊<br><span>Dashboard</span></a>
    <a href="setting.html" class="text-gray-500">⚙️<br><span>Settings</span></a>
  </footer>

  <script src="app.js"></script>
  <script>
    let db;
    // Buka DB yang sama dengan app.js
    document.addEventListener("DOMContentLoaded", () => {
      const request = indexedDB.open("NUSAPOS_DB", 1);
      request.onsuccess = (e) => {
        db = e.target.result;
        loadDashboardData(); // load data pas buka
        cekBackupOtomatis(); // jalanin auto backup
        setInterval(cekBackupOtomatis, 60000);
      };
    });

    async function getAllData(storeName) {
        return new Promise((resolve) => {
            const tx = db.transaction(storeName, "readonly");
            tx.objectStore(storeName).getAll().onsuccess = (e) => resolve(e.target.result);
        });
    }

    async function loadDashboardData() {
        const transaksi = await getAllData('transaksi');
        const hariIni = new Date().toDateString();

        // 1. Hitung Omset Hari Ini
        const transaksiHariIni = transaksi.filter(t => new Date(t.tanggal).toDateString() === hariIni);
        const omset = transaksiHariIni.reduce((sum, t) => sum + t.total, 0);
        document.getElementById('omset-hari-ini').innerText = `Rp ${omset.toLocaleString('id-ID')}`;
        document.getElementById('total-transaksi').innerText = transaksiHariIni.length;

        // 2. Bikin Data Grafik 7 Hari
        const salesData = [];
        const daysLabels = [];
        for(let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            daysLabels.push(d.toLocaleDateString('id-ID', {weekday: 'short'}));
            const omsetHari = transaksi
               .filter(t => new Date(t.tanggal).toDateString() === d.toDateString())
               .reduce((sum, t) => sum + t.total, 0);
            salesData.push(omsetHari);
        }

        // 3. Gambar Grafik
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: daysLabels,
                datasets: [{
                    label: 'Omset',
                    data: salesData,
                    backgroundColor: '#14B3B5',
                    borderRadius: 6
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}}}
        });
    }

    // 4. FITUR AUTO BACKUP REK KORAN TGL 1
    async function backupRekKoran(bulan, tahun) {
        const transaksi = await getAllData('transaksi');
        const dataBulanIni = transaksi.filter(t => {
            const tgl = new Date(t.tanggal);
            return tgl.getMonth() + 1 == bulan && tgl.getFullYear() == tahun;
        });
        const dataBackup = { nama_toko: "NUSAPOS", periode: `${bulan}-${tahun}`, data_transaksi: dataBulanIni };
        const namaFile = `RekKoran_NUSAPOS_${bulan}-${tahun}.json`;
        const blob = new Blob([JSON.stringify(dataBackup, null, 2)], {type: "application/json"});
        try {
            const handle = await window.showSaveFilePicker({ suggestedName: namaFile });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            alert(`Backup ${namaFile} Berhasil!`);
        } catch(err) {}
    }

    function cekBackupOtomatis() {
        const sekarang = new Date();
        if (sekarang.getDate() === 1 && sekarang.getHours() === 0 && sekarang.getMinutes() === 1) {
            const bulanLalu = sekarang.getMonth();
            const tahun = bulanLalu === 0? sekarang.getFullYear() - 1 : sekarang.getFullYear();
            const bulan = bulanLalu === 0? 12 : bulanLalu;
            const key = `backup_${bulan}-${tahun}`;
            if(!localStorage.getItem(key)) {
                backupRekKoran(bulan, tahun);
                localStorage.setItem(key, 'sudah');
            }
        }
    }

    // JAM REALTIME
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>
