<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NusaPOS Mobile - Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { nusanavy: '#0F2537', nusatosca: '#14B3B5' }
  </script>
</head>
<body class="bg-nusanavy font-sans h-screen flex-col text-white">

  <header class="bg-nusanavy border-b border-gray-800 p-4">
    <h1 class="text-sm font-bold">Settings</h1>
  </header>

  <main class="flex-1 overflow-y-auto p-5 space-y-4 pb-24">
    
    <div class="bg-gray-900/50 p-4 rounded-2xl border border-gray-800">
      <h3 class="text-xs font-bold text-gray-400 uppercase mb-3">Backup & Data</h3>
      
      <button onclick="backupRekKoran(new Date().getMonth()+1, new Date().getFullYear())" 
        class="w-full bg-nusatosca text-nusanavy font-bold py-3 rounded-xl mb-3">
        Backup Bulan Ini Manual
      </button>
      <p class="text-[10px] text-gray-400">Auto backup akan jalan tiap tgl 1 jam 00:01</p>
    </div>

    <div class="bg-red-900/30 p-4 rounded-2xl border-red-800">
      <h3 class="text-xs font-bold text-red-400 uppercase mb-3">Zona Bahaya</h3>
      
      <button onclick="hapusSemuaData()" 
        class="w-full bg-red-600 text-white font-bold py-3 rounded-xl">
        HAPUS SEMUA DATA TRANSAKSI
      </button>
      <p class="text-[10px] text-red-300 mt-2">Data transaksi akan dihapus permanen. Grafik & Omset jadi 0</p>
    </div>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-gray-950/90 border-t border-gray-900 p-3 flex justify-around">
    <a href="dashboard.html" class="text-gray-500">📊<br><span>Dashboard</span></a>
    <a href="setting.html" class="text-nusatosca">⚙️<br><span>Settings</span></a>
  </footer>

  <script src="app.js"></script>
  <script>
    let db;
    document.addEventListener("DOMContentLoaded", () => {
      const request = indexedDB.open("NUSAPOS_DB", 1);
      request.onsuccess = (e) => { db = e.target.result; };
    });

    async function getAllData(storeName) {
        return new Promise((resolve) => {
            const tx = db.transaction(storeName, "readonly");
            tx.objectStore(storeName).getAll().onsuccess = (e) => resolve(e.target.result);
        });
    }

    // FUNGSI BACKUP MANUAL
    async function backupRekKoran(bulan, tahun) {
        const transaksi = await getAllData('transaksi');
        const dataBulanIni = transaksi.filter(t => {
            const tgl = new Date(t.tanggal);
            return tgl.getMonth() + 1 == bulan && tgl.getFullYear() == tahun;
        });
        const dataBackup = { nama_toko: "NUSAPOS", periode: `${bulan}-${tahun}`, data_transaksi: dataBulanIni };
        const namaFile = `RekKoran_NUSAPOS_${bulan}-${tahun}.json`;
        const blob = new Blob([JSON.stringify(dataBackup, null, 2)], {type: "application/json"});
        try {
            const handle = await window.showSaveFilePicker({ suggestedName: namaFile });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            alert(`Backup ${namaFile} Berhasil!`);
        } catch(err) { alert("Backup dibatalkan"); }
    }

    // FUNGSI HAPUS DATA
    function hapusSemuaData() {
        if(confirm("Yakin mau hapus SEMUA data transaksi? Tindakan ini tidak bisa dibatalkan!")) {
            const tx = db.transaction('transaksi', 'readwrite');
            tx.objectStore('transaksi').clear();
            tx.oncomplete = () => {
                alert("Semua data berhasil dihapus!");
                window.location.href = 'dashboard.html'; // balik ke dashboard
            }
        }
    }
  </script>
</body>
</html>
