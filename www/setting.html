<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Info Toko</h2>
        <div class="card">
            <input type="text" id="namaToko" placeholder="Nama Toko">
            <input type="text" id="alamat" placeholder="Alamat">
            <button onclick="simpanSetting()">Simpan Info Toko</button>
        </div>
    </div>
    <nav>
        <a href="index.html" class="nav-btn">Home</a>
        <a href="catalog.html" class="nav-btn">Katalog</a>
        <a href="setting.html" class="nav-btn">Setting</a>
    </nav>
    <script src="app.js"></script>
    <script>
        function simpanSetting() {
            const data = {
                nama: document.getElementById('namaToko').value,
                alamat: document.getElementById('alamat').value
            };
            simpanData('infoToko', data);
        }
    </script>
</body>
</html>
