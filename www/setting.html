<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F2537] text-white p-6">
  <h1 class="font-bold text-lg mb-4">Pengaturan Modul</h1>
  
  <div class="bg-gray-900 p-4 rounded-xl mb-6">
    <input type="text" id="name" placeholder="Nama Menu" class="w-full bg-black p-2 rounded mb-2 text-sm">
    <input type="text" id="icon" placeholder="Emoji (contoh: 📊)" class="w-full bg-black p-2 rounded mb-2 text-sm">
    <button onclick="addPage()" class="w-full bg-[#14B3B5] p-2 rounded font-bold">TAMBAH MENU</button>
  </div>

  <div id="list" class="space-y-2"></div>

  <script>
    function render() {
      const list = document.getElementById('list');
      const pages = JSON.parse(localStorage.getItem('custom_pages')) || [];
      list.innerHTML = pages.map(p => `
        <div class="flex justify-between items-center bg-gray-800 p-3 rounded">
          <span>${p.icon} ${p.name}</span>
          <button onclick="del('${p.id}')" class="text-red-400 text-xs">Hapus</button>
        </div>
      `).join('');
    }

    function addPage() {
      const name = document.getElementById('name').value;
      const icon = document.getElementById('icon').value;
      if(!name) return;
      const pages = JSON.parse(localStorage.getItem('custom_pages')) || [];
      pages.push({id: Date.now().toString(), name, icon});
      localStorage.setItem('custom_pages', JSON.stringify(pages));
      render();
    }

    function del(id) {
      let pages = JSON.parse(localStorage.getItem('custom_pages')) || [];
      pages = pages.filter(p => p.id !== id);
      localStorage.setItem('custom_pages', JSON.stringify(pages));
      render();
    }
    render();
  </script>
</body>
</html>
