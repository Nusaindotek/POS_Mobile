<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NusaPOS Mobile Beta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nusanavy: '#102A43',  /* Navy Gelap Logo */
            nusatosca: '#14B8A6', /* Tosca Logo */
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col justify-between overflow-hidden select-none">

  <header class="bg-nusanavy text-white p-4 flex justify-between items-center shadow-md">
    <div class="flex items-center space-x-2">
      <div class="w-6 h-6 bg-nusatosca rounded flex items-center justify-center font-bold text-xs">N</div>
      <h1 class="text-md font-bold tracking-wide">NusaPOS <span class="text-[10px] bg-nusatosca px-1.5 py-0.5 rounded-full font-semibold">MOBILE</span></h1>
    </div>
    <span id="clock" class="text-xs font-mono text-nusatosca font-bold">00:00</span>
  </header>

  <main class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
    
    <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 flex space-x-2">
      <input type="text" placeholder="Cari nama barang / scan barcode..." class="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-nusatosca text-gray-800">
      <button class="bg-nusatosca text-white px-3 rounded-lg text-sm font-semibold shadow-sm hover:bg-teal-600 active:scale-95 transition">
        Cari
      </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="bg-gray-50 p-3 border-b border-gray-100 flex justify-between">
        <span class="text-xs font-bold text-gray-500 uppercase">Item di Keranjang</span>
        <span class="text-xs font-bold text-nusatosca" id="total-items">0 Barang</span>
      </div>
      
      <div class="p-3 divide-y divide-gray-100" id="cart-list">
        <div class="py-2.5 flex justify-between items-center">
          <div>
            <h4 class="text-sm font-medium text-gray-800">Kopi Susu Nusa</h4>
            <span class="text-xs text-gray-400">1 x Rp 18.000</span>
          </div>
          <span class="text-sm font-bold text-gray-700">Rp 18.000</span>
        </div>
      </div>
    </div>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-xl flex items-center justify-between z-50">
    <div>
      <span class="text-xs text-gray-400 block font-medium">Total Tagihan</span>
      <span class="text-xl font-bold text-nusanavy" id="grand-total">Rp 18.000</span>
    </div>
    <button class="bg-nusatosca hover:bg-teal-600 active:scale-95 text-white font-bold px-6 py-3 rounded-xl shadow-md transition duration-150 text-sm tracking-wide uppercase">
      Bayar Sekarang
    </button>
  </footer>

  <script>
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
    }, 1000);
  </script>
</body>
</html>
