<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    body { background: #0F2537; color: white; font-family: sans-serif; padding: 15px; }
    .card { background: #1B365D; padding: 20px; border-radius: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="toko-name">NusaPOS</h2>
    <div id="omset" style="font-size:24px; color:#00B5B5;">Rp 0</div>
  </div>
  <div style="margin-top:20px;">
    <a href="index.html" style="color:#00B5B5;">Pergi ke Kasir</a> | 
    <a href="report.html" style="color:#00B5B5;">Lihat Laporan</a>
  </div>
  <script src="app.js"></script>
  <script>
    window.addEventListener('db-ready', async () => {
      const data = await window.getAllData('transaksi');
      const total = data.reduce((sum, item) => sum + item.total, 0);
      document.getElementById('omset').innerText = "Rp " + total.toLocaleString();
    });
  </script>
</body>
</html>
