<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14B3B5">
<style>
*{box-sizing:border-box}
body{background:#0F2537; color:white; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; padding:0 0 80px 0} /* padding bawah buat navbar */
.header{display:flex; align-items:center; justify-content:space-between; padding:16px; position:sticky; top:0; background:#0F2537; z-index:10}
.header-left{display:flex; align-items:center; gap:12px}
.header img{width:40px; height:40px; border-radius:8px; object-fit:cover}
.header b{font-size:16px}
.header small{color:#14B3B5; font-size:12px}
.waktu{color:#14B3B5; font-weight:bold; font-size:14px}
.card{background:#1a2e3d; margin:12px; padding:16px; border-radius:12px}
.card-flex{display:flex; justify-content:space-between}
.tosca{color:#14B3B5; font-size:24px; font-weight:bold}
.card-header{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
.badge-live{background:rgba(20,179,181,0.2); color:#14B3B5; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:bold}
.menu-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 12px; margin-bottom:12px}
.menu-card{background:#1a2e3d; padding:20px; border-radius:12px; text-align:center; text-decoration:none; color:white}
.badge{background:green; padding:4px 10px; border-radius:20px; font-size:11px}
canvas{background:transparent; width:100% !important; height:220px !important}

/* NAVBAR BAWAH RAPI */
.bottom-nav{position:fixed; bottom:0; left:0; width:100%; height:65px; background:#0a141c; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #2a3e4d; padding-bottom: env(safe-area-inset-bottom)}
.nav-item{color:#888; text-decoration:none; text-align:center; font-size:11px; flex:1; padding:5px 0}
.nav-item.active{color:#14B3B5; font-weight:600}
.nav-icon{font-size:22px; line-height:1; margin-bottom:3px}
</style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img id="logo-dashboard" src="https://via.placeholder.com/40/14B3B5/0F2537?text=N">
      <div>
        <b id="nama-dashboard">NusaPOS</b><br>
        <small>Status: Premium Beta</small>
      </div>
    </div>
    <div class="waktu" id="jam">15.02</div>
  </div>

  <div class="card">
    <div class="card-flex">
      <div>
        <div style="color:#888; font-size:13px">OMSET HARI INI</div>
        <div class="tosca" id="omset-hari-ini">Rp 0</div>
      </div>
      <div style="text-align:right">
        <div style="color:#888; font-size:13px">TRANSAKSI</div>
        <div style="font-size:24px; font-weight:bold" id="transaksi-hari-ini">0</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <b>STATISTIK JUALAN (7 HARI TERAKHIR)</b>
      <span class="badge-live">Grafik Live</span>
    </div>
    <canvas id="grafik"></canvas>
  </div>

  <div style="padding:0 12px; margin:12px 0; color:#888">AKSES HALAMAN TOKO</div>
  <div class="menu-grid">
    <a href="catalog.html" class="menu-card">🛒<br><b>Mesin Kasir</b><br><span class="badge">Aktif</span></a>
    <a href="catalog.html" class="menu-card">📦<br><b>Katalog Barang</b><br><span class="badge">Aktif</span></a>
  </div>

  <div class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">
      <div class="nav-icon">📊</div>
      <div>DASHBOARD</div>
    </a>
    <a href="catalog.html" class="nav-item">
      <div class="nav-icon">🧾</div>
      <div>KASIR</div>
    </a>
    <a href="report.html" class="nav-item">
      <div class="nav-icon">📈</div>
      <div>LAPORAN</div>
    </a>
    <a href="setting.html" class="nav-item">
      <div class="nav-icon">⚙️</div>
      <div>SETTING</div>
    </a>
  </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// 0. LOAD NAMA TOKO & LOGO DARI SETTING
document.getElementById('nama-dashboard').innerText = localStorage.getItem('namaToko') || 'NusaPOS';
document.getElementById('logo-dashboard').src = localStorage.getItem('logoToko') || 'https://via.placeholder.com/40/14B3B5/0F2537?text=N';

// Update jam real time
setInterval(()=>{
  document.getElementById('jam').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
}, 1000)

const riwayat = JSON.parse(localStorage.getItem('riwayat')) || [];
const hariIni = new Date().toLocaleDateString('id-ID');

// 1. HITUNG OMSET & TRANSAKSI HARI INI
const transaksiHariIni = riwayat.filter(t => new Date(t.tanggal).toLocaleDateString('id-ID') === hariIni);
const omsetHariIni = transaksiHariIni.reduce((sum, t) => sum + t.total, 0);
document.getElementById('omset-hari-ini').innerText = `Rp ${omsetHariIni.toLocaleString('id-ID')}`;
document.getElementById('transaksi-hari-ini').innerText = transaksiHariIni.length;

// 2. BUAT DATA 7 HARI TERAKHIR UNTUK GRAFIK BATANG
const labels = [];
const dataOmset = [];
for(let i=6; i>=0; i--){
  const d = new Date();
  d.setDate(d.getDate() - i);
  const tgl = d.toLocaleDateString('id-ID');
  labels.push(d.toLocaleDateString('id-ID', {weekday: 'short'}));

  const omset = riwayat
    .filter(t => new Date(t.tanggal).toLocaleDateString('id-ID') === tgl)
    .reduce((sum, t) => sum + t.total, 0);
  dataOmset.push(omset);
}

// 3. GAMBAR GRAFIK BATANG
const ctx = document.getElementById('grafik');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      label: 'Omset',
      data: dataOmset,
      backgroundColor: '#14B3B5',
      borderRadius: 8,
      barThickness: 25
    }]
  },
  options: {
    plugins: {legend: {display: false}},
    scales: {
      y: {
        ticks: {
          color: '#888',
          callback: function(value) { return 'Rp ' + (value/1000) + 'k' }
        }, 
        grid: {color: 'rgba(255,255,255,0.1)'}
      },
      x: {
        ticks: {color: '#888'}, 
        grid: {display: false}
      }
    },
    responsive: true,
    maintainAspectRatio: false
  }
})

// PWA SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
